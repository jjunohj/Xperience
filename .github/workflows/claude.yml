name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request:
    types: [opened, synchronize, ready_for_review]

# 같은 PR/이슈 + 같은 이벤트 종류에서 새 이벤트가 오면 진행 중이던 실행은 취소 (러너 시간 절약).
# event_name을 그룹에 포함해야 함: track_progress가 다는 진행 코멘트(issue_comment)가
# 진행 중이던 PR 리뷰(pull_request)를 자기 취소(self-cancel)하는 것을 방지한다.
concurrency:
  group: claude-${{ github.event_name }}-${{ github.event.pull_request.number || github.event.issue.number || github.ref }}
  cancel-in-progress: true

jobs:
  claude:
    # 댓글/이슈 이벤트는 @claude 멘션이 있을 때만,
    # PR 이벤트는 초안(draft)이 아닐 때만 실행
    if: |
      (github.event_name == 'pull_request' && github.event.pull_request.draft == false) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude'))) ||
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude'))
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
      actions: read # github_ci MCP(리뷰 시 CI 상태 조회)에 필요
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # PR 이벤트일 때만 진행상황 추적 코멘트 + 인라인 리뷰 모드 활성화
          track_progress: ${{ github.event_name == 'pull_request' }}
          # PR이면 자동 코드 리뷰, 이슈/댓글이면 @claude 멘션에 대화형으로 반응
          prompt: >-
            ${{ github.event_name == 'pull_request' && '이 PR의 변경사항(diff)을 코드 리뷰해줘. 우선순위는 (1) 버그·로직 오류·엣지케이스 (2) 보안 취약점 (3) 성능 회귀 (4) 레포 컨벤션 위반 — AGENTS.md / DESIGN.md / 디자인 토큰(--pf-*) / 커밋·네이밍 규칙. 확신이 높은 핵심 이슈만 골라 해당 코드 라인에 인라인 코멘트로 남기고, 각 코멘트는 「문제 → 이유 → 수정 제안」 순서로 간결하게 작성해줘. 단순 취향 차이나 사소한 칭찬은 생략하고, 마지막에 한국어로 3~5줄 요약과 머지 판단(LGTM / 변경요청)을 정리해줘. 모든 출력은 한국어로.' || '' }}
